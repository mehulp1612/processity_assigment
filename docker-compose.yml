# Local dev / deploy for the Supermarket Ops Agent.
#
#   docker compose up -d db                                  # just Postgres
#   docker compose build
#   docker compose run --rm app python -m pytest             # run the test suite
#   docker compose run --rm app python -m scripts.seed --reset
#   docker compose up                                        # Postgres + the agent
#
# The app container runs uvicorn, which supervises the process and hot-reloads on
# edits. Postgres is a separate container with a named volume, so rebuilds and
# `docker compose down` never touch the store of record.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: store
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Exposed so the test suite and psql can reach it from the host.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d store"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  app:
    build: .
    image: supermarket-ops-agent
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/store
      TEST_DATABASE_URL: postgresql://postgres:postgres@db:5432/store_test
    depends_on:
      db:
        # Don't start until Postgres actually accepts connections.
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Live reload during development.
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      # Persist generated invoices & decks so you can inspect them on the host.
      - ./out:/app/out
    command: >
      uvicorn app.api:app
      --host 0.0.0.0 --port 8000
      --reload --reload-dir /app/app
    restart: unless-stopped

volumes:
  pgdata:
